# Git hooks, managed by Lefthook (replaces husky + lint-staged).
# Install/refresh with `pnpm exec lefthook install` (wired into `prepare`).
# yaml-language-server: $schema=https://json.schemastore.org/lefthook.json

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "**/*.ts"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "**/*.{ts,json,md,yml,yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: node bin/lint-commit.mjs --edit {1}

# Same whole-repo verify the old single-chain hook ran, split into independent
# commands so lefthook runs them CONCURRENTLY (`parallel: true`). Wall-clock drops
# from the sum of the steps to roughly the slowest lane — the fix for the multi-
# minute serial run that was overrunning push timeouts. The token SET is unchanged,
# so `check:cadence` (which compares tokens, not structure) stays green with no
# CLAUDE.md edit. Tradeoffs of parallelising: a cheap failure (e.g. format:check)
# no longer short-circuits before the expensive test run, and vitest+eslint+tsc now
# run at once (more CPU/RAM). Worth it — the all-pass push is the case that timed out.
pre-push:
  parallel: true
  commands:
    format:
      run: pnpm format:check
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test:coverage
    # build + check:exports catch a broken compile or exports map (publint / attw)
    # locally instead of first in CI. Kept in ONE command so build's dist/ output
    # precedes the pack — the single hard ordering dependency (lefthook has no
    # per-command DAG). build is turbo-cached, so its marginal cost is small.
    build-exports:
      run: pnpm build && pnpm check:exports
    # Refuse to push unsigned/unverified commits (skipped in CI so release
    # automation isn't wedged). Bypassable with --no-verify; the unbypassable
    # layer is branch-protection "Require signed commits" (ADR-0016).
    verify-signatures:
      run: node bin/verify-signed-range.mjs
    # Catch agent/model-matrix drift locally instead of first in CI (was
    # CI-only; see docs/contributing/model-selection.md "Enforcement").
    check-agents:
      run: pnpm check:agents

# Fire after `git rebase` completes (including a no-op rebase with nothing to
# replay) and after `git merge` completes. Regenerates the derived files the
# m3l-generated merge driver (.gitattributes, ADR-0024) deliberately left
# un-regenerated, then reports dirty files for a `docs: reconcile doc
# metadata` commit — never auto-commits, never blocks (always exits 0).
post-rewrite:
  commands:
    regen:
      run: node bin/post-integrate-regen.mjs

post-merge:
  commands:
    regen:
      run: node bin/post-integrate-regen.mjs
