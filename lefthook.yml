# Git hooks, managed by Lefthook (replaces husky + lint-staged).
# Install/refresh with `pnpm exec lefthook install` (wired into `prepare`).
# yaml-language-server: $schema=https://json.schemastore.org/lefthook.json

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "**/*.ts"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "**/*.{ts,json,md,yml,yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: node bin/lint-commit.mjs --edit {1}

pre-push:
  commands:
    verify:
      run: pnpm format:check && pnpm lint && pnpm typecheck && pnpm test:coverage
    # Refuse to push unsigned/unverified commits (skipped in CI so release
    # automation isn't wedged). Bypassable with --no-verify; the unbypassable
    # layer is branch-protection "Require signed commits".
    verify-signatures:
      run: node bin/verify-signed-range.mjs
