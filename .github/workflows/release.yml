name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  # id-token backs npm provenance below; attestations backs the SBOM attestation
  # step (ADR-0015).
  id-token: write
  attestations: write

jobs:
  release:
    # Only release when the CI run on main succeeded.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # SBOM for the published package (ADR-0015). Gated on RELEASE_ENABLED so we
      # only attest real-release runs, matching the publish gate below. The graph
      # is small today (zero runtime deps) but grows as submodules land.
      - name: Generate SBOM (CycloneDX)
        if: vars.RELEASE_ENABLED == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: packages/m3l-common
          format: cyclonedx-json
          output-file: packages/m3l-common/sbom.cdx.json

      # Sign the SBOM against the built artifacts, producing a verifiable
      # attestation next to the npm provenance from semantic-release.
      - name: Attest SBOM
        if: vars.RELEASE_ENABLED == 'true'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-path: packages/m3l-common/dist
          sbom-path: packages/m3l-common/sbom.cdx.json

      # semantic-release owns the version; tokens come from the CI vault only.
      # RELEASE_ENABLED repo variable gates the publish: unset → dry-run only.
      # Set it with: gh variable set RELEASE_ENABLED --body true
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          if [[ "${{ vars.RELEASE_ENABLED }}" == "true" ]]; then
            pnpm exec semantic-release
          else
            pnpm exec semantic-release --dry-run
          fi
