# Builds and deploys the GitHub Pages site (ADR-0032): the visibility-hub
# dashboard at the site root (bin/gen-project-hub.mjs -> dist/index.html)
# plus the AI co-authorship commit-stats endpoint-badge JSON under
# /commit-stats/ (bin/gen-commit-stats-endpoint.mjs, ADR-0032 addendum).
#
# Supersedes pages-commit-stats.yml: GitHub Pages serves one site per repo
# and every deploy replaces the whole site, so both artifacts MUST be
# generated in this single build job and uploaded as one dist/ artifact —
# never split into a second Pages workflow. GITHUB_TOKEN only, no git commit.
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # first-deploy verification / manual refresh

permissions:
  contents: read

# GitHub's Pages convention: one deploy group, never cancel a production
# deploy mid-flight (deliberate deviation from ci.yml's cancel-in-progress).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the commit-stats generator counts Co-Authored-By
          # trailers across all of git log and totals via rev-list --count.
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      # No pnpm install: both generators use only node builtins plus
      # dependency-free repo .mjs modules, and shell out to git.
      - name: Generate commit-stats endpoint badge JSON
        run: node bin/gen-commit-stats-endpoint.mjs

      - name: Generate visibility-hub dashboard
        run: node bin/gen-project-hub.mjs

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
