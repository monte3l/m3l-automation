name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Secret scan runs first and independently (rules 05 / security.md):
      # no committed secret should ever reach the build.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Block on HIGH/CRITICAL advisories before spending runner minutes on the
      # rest of the pipeline (rules 05 / security gate requirement).
      - name: Security audit
        run: pnpm audit --audit-level=high

      # Gates outdated majors, deprecated packages, and peer mismatches — the
      # dimensions pnpm audit does not cover (vulnerabilities are above).
      - name: Check dependencies
        run: pnpm check:deps

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: node bin/lint-commit.mjs --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      # Fast-first ordering (rules 05): cheap checks short-circuit the slow ones.
      - name: Lint
        run: pnpm lint

      # Prettier only --write's in the pre-commit hook; this catches drift from
      # any commit that bypassed hooks.
      - name: Format check
        run: pnpm format:check

      - name: Lint Markdown
        run: pnpm lint:md

      - name: Type-check
        run: pnpm typecheck

      # The exports map is the public API contract; fail if it drifted from the
      # committed snapshot without a deliberate update (rules 04 / semver).
      - name: Check public API snapshot
        run: pnpm check:api

      # Doc-provenance sidecars anchor reference-page headings to source symbols
      # at a git commit. Fail if a heading or symbol is missing; warn on staleness.
      - name: Check doc provenance
        run: pnpm check:provenance

      # Submodule counts in prose must match the files in docs/reference/.
      - name: Check doc counts
        run: pnpm check:doc-counts

      # The CI/CD table in CLAUDE.md must document exactly the workflow files in
      # .github/workflows/ (count + one row each) — no undocumented or stale rows.
      - name: Check workflow docs
        run: pnpm check:workflows-doc

      # The implemented-count numerator ("N of 22") must match the ✅ rows in
      # docs/implementation-status.md across every badge / prose / HTML site.
      - name: Check implementation count
        run: pnpm check:impl-counts

      # catalog.json, symbol-map.json, and README.md catalog block must match
      # the current docs/reference/ + provenance sidecar state.
      - name: Check reference index
        run: pnpm check:index

      # Run with coverage so the thresholds in vitest.config.ts actually gate
      # CI (rules 02): `vitest run` alone never evaluates them.
      - name: Test (with coverage gate)
        run: pnpm test:coverage

      # Per-file test counts recorded in docs/implementation-status.md must match
      # the live suite. This derives them by running Vitest a second time — the
      # duplicate run is deliberate (the coverage gate above cannot emit counts);
      # do not "optimize" it away by folding it into the step above.
      - name: Check test counts
        run: pnpm check:test-counts

      - name: Build
        run: pnpm build

      # Publish correctness (exports map / ESM / types resolution) and
      # dead-code detection. Run after build so the dist/ artifacts exist.
      - name: Check package exports (publint + are-the-types-wrong)
        run: pnpm check:exports

      # Barrel re-export completeness: every src/core|aws/<mod>/index.ts must
      # appear in its namespace barrel and vice-versa. Runs after build so the
      # barrel is proven to compile before we assert it is complete.
      - name: Check barrel re-exports (scaffold)
        run: pnpm check:scaffold

      # Scaffold seam: every src/core|aws/<mod>/index.ts must carry its TDD test
      # file (tests/<mod>.test.ts) and a row in docs/implementation-status.md.
      # Backstop for the scaffolding-submodules scaffolding skill.
      - name: Check scaffold seam (test + status row)
        run: pnpm check:scaffold-seam

      # Every public export surfaced through a namespace barrel must be
      # documented — present in its reference page heading or provenance sidecar.
      # Deterministic backstop for the spec-conformance / docs-consistency spokes.
      - name: Check barrel vs docs exports
        run: pnpm check:doc-exports

      # Subagent config: skill/CLAUDE.md references resolve to real agents or
      # built-ins, and no spoke is granted the Agent tool (no-nesting invariant).
      - name: Check subagent configuration (agents)
        run: pnpm check:agents

      # .worktreeinclude hygiene: no tracked files and no unresolvable literal
      # paths, so worktree:setup provisions a fresh worktree correctly.
      - name: Check worktree include
        run: pnpm check:worktree

      - name: Unused files / exports / dependencies (knip)
        run: pnpm knip
