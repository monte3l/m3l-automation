name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    # Anthropic publishes no recommended value; reviews average ~20 minutes
    # per code.claude.com/docs/en/code-review — 45 gives headroom for this
    # repo's largest observed PRs (~5k changes) without leaving the GitHub
    # default (360min) as an effective non-limit. See
    # docs/research/pr-review-action-tuning.md.
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Skip a full re-review when the prior verdict was PASS and nothing
      # reviewable has changed since. The job still runs (so the required
      # `review` check always reports); only the Claude step below is gated.
      # Fail-safe: any ambiguity defaults to should_review=true so the gate is
      # never silently weakened. See docs/contributing/branch-protection.md.
      - name: Check prior review verdict
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # There is no top-level `paths-ignore` trigger filter — the job must
          # run (and report a status) on every non-draft PR touching main, so
          # this predicate alone decides what's reviewable, for both a
          # brand-new PR (Gate 0 below) and a re-review since the last PASS
          # (further down).
          is_ignored() {
            case "$1" in
              *.md) return 0 ;;
              docs/*) return 0 ;;
              .github/dependabot.yml) return 0 ;;
              *) return 1 ;;
            esac
          }

          review() {
            echo "should_review=true" >> "$GITHUB_OUTPUT"
            echo "$1"
          }

          # Gate 0: is there anything reviewable in the PR at all, regardless
          # of review history? Must run BEFORE the prior-comment check below,
          # so a brand-new, 100%-docs PR short-circuits here on its first push
          # instead of falling into "no prior comment" and triggering a real
          # review. Fail-safe: any ambiguity defaults to should_review=true.
          full_files="$(gh pr diff "$PR" -R "$REPO" --name-only 2>/dev/null || echo "__ERROR__")"
          if [ "$full_files" = "__ERROR__" ]; then
            review "gh pr diff --name-only failed — running review."
            exit 0
          fi
          if [ -z "$full_files" ]; then
            review "PR diff reports no changed files — running review."
            exit 0
          fi

          non_ignored_files=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! is_ignored "$f"; then
              non_ignored_files="${non_ignored_files}${f}"$'\n'
            fi
          done <<< "$full_files"
          non_ignored_count="$(printf '%s' "$non_ignored_files" | grep -c . || true)"

          # Whether this PR's only reviewable change is the review-gate
          # workflow itself. GitHub refuses to mint the OIDC token
          # claude-code-action needs whenever the running workflow file
          # differs from main's copy, so the action always self-skips on
          # such a PR — a live review can never happen here regardless of
          # should_review. Recorded now so the fallback step after the
          # action can tell "structurally impossible" (safe to auto-pass)
          # apart from "Claude ran and forgot to write a verdict" (a real
          # bug that must keep failing). Fail-safe default: false.
          only_workflow_gate_change=false
          if [ "$non_ignored_count" -eq 1 ] \
             && [ "$(printf '%s' "$non_ignored_files" | head -n1)" = ".github/workflows/claude-pr-review.yml" ]; then
            only_workflow_gate_change=true
          fi
          echo "only_workflow_gate_change=$only_workflow_gate_change" >> "$GITHUB_OUTPUT"

          if [ "$non_ignored_count" -eq 0 ]; then
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            echo "Entire PR diff is docs/config-only — skipping review."
            exit 0
          fi

          # --slurp so the jq filter runs once over all pages (a bare
          # --paginate --jq applies `last` per page and can concatenate bodies).
          body="$(gh api "repos/$REPO/issues/$PR/comments" --paginate --slurp \
            --jq 'add | [.[] | select(.user.login == "claude[bot]")] | last // {} | .body // ""' \
            2>/dev/null || true)"

          if [ -z "$body" ]; then
            review "No prior claude[bot] comment — running review."
            exit 0
          fi

          if ! printf '%s' "$body" | grep -A2 '^### Verdict' | grep -qiw 'PASS'; then
            review "Prior verdict was not PASS — running review."
            exit 0
          fi

          reviewed_sha="$(printf '%s' "$body" \
            | sed -n 's/.*<!-- claude-review-sha: \([0-9a-f]*\) -->.*/\1/p' | head -n1)"
          if [ -z "$reviewed_sha" ]; then
            review "Prior comment has no reviewed-sha marker — running review."
            exit 0
          fi

          files="$(gh api "repos/$REPO/compare/$reviewed_sha...$HEAD_SHA" \
            --jq '.files[].filename' 2>/dev/null || echo "__ERROR__")"
          if [ "$files" = "__ERROR__" ]; then
            review "Compare API failed — running review."
            exit 0
          fi
          if [ -z "$files" ]; then
            review "No compare data — running review."
            exit 0
          fi

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! is_ignored "$f"; then
              review "Reviewable file changed since PASS ($f) — running review."
              exit 0
            fi
          done <<< "$files"

          echo "should_review=false" >> "$GITHUB_OUTPUT"
          echo "Prior verdict PASS and only ignored files changed since $reviewed_sha — skipping review."

      # Pre-compute the diff once and hand it to Claude so the reviewer reads a
      # single patch file instead of burning turns rediscovering the diff via
      # `gh pr diff` / `git diff` (the main turn-count driver). `gh pr diff` is
      # API-based, so it works on the `fetch-depth: 1` shallow checkout without
      # deepening the clone. Non-fatal: on any gh failure the files are removed
      # and the review prompt falls back to fetching the diff itself.
      - name: Pre-compute PR diff for review
        if: steps.guard.outputs.should_review == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr diff "$PR" -R "$REPO" --patch \
            > "$GITHUB_WORKSPACE/.claude-pr-diff.patch" \
            || rm -f "$GITHUB_WORKSPACE/.claude-pr-diff.patch"
          gh pr diff "$PR" -R "$REPO" --name-only \
            > "$GITHUB_WORKSPACE/.claude-pr-changed-files.txt" \
            || rm -f "$GITHUB_WORKSPACE/.claude-pr-changed-files.txt"

          # pnpm-lock.yaml is mechanically regenerated and already validated
          # elsewhere (`pnpm install --frozen-lockfile` in CI,
          # dependency-review.yml) — its diff adds volume without review
          # value. Strip that one hunk from the patch Claude reads; leave
          # every other file's diff untouched. Non-fatal: on any failure the
          # original patch is left as-is rather than the job aborting.
          patch="$GITHUB_WORKSPACE/.claude-pr-diff.patch"
          if [ -f "$patch" ]; then
            awk '
              /^diff --git a\/pnpm-lock\.yaml b\/pnpm-lock\.yaml$/ {
                print
                print "(diff omitted — pnpm-lock.yaml is mechanically generated;"
                print " validated by `pnpm install --frozen-lockfile` in CI and"
                print " dependency-review.yml, not by this reviewer)"
                skip = 1
                next
              }
              /^diff --git / { skip = 0 }
              skip { next }
              { print }
            ' "$patch" > "$patch.stripped" 2>/dev/null \
              && mv "$patch.stripped" "$patch" \
              || rm -f "$patch.stripped"
          fi

      - uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        id: claude-review
        if: steps.guard.outputs.should_review == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-5 --allowedTools Bash,Read --max-turns 100"
          use_sticky_comment: true
          prompt: |
            You are the blocking PR reviewer for this repo. Review ONLY what is visible in
            the diff; do not speculate about code outside it. Do not modify any files.

            ## TypeScript

            - No `any` — use `unknown` and narrow with type guards
            - No non-null `!` assertions in `src/`
            - All exported symbols must have TSDoc; primary entry points need an `@example`

            ## ESM imports

            - Relative imports must carry a `.js` extension (`./foo.js`, not `./foo`)
            - No CommonJS constructs (`require`, `module.exports`, `__dirname`)

            ## Error handling

            - Only throw instances of `M3LError` subclasses, never bare strings
            - Chain underlying failures with the `cause` option

            ## Testing

            - Every exported function must have at least one happy-path test and one failure-path test
            - Tests import from `src/` with `.js` extensions
            - No network calls or filesystem access in unit tests (mock collaborators)
            - Coverage thresholds are 80% lines/functions/branches/statements; run `pnpm test:coverage` to verify
            - The v8 text reporter omits files that are 100% covered — absence from the table is NOT a gap; if coverage looks incomplete, check `coverage/coverage-final.json` directly
            - Tests for error channels may carry `// eslint-disable-next-line only-throw-error` or `// eslint-disable-next-line prefer-promise-reject-errors`; these are acceptable when intentionally verifying that code handles non-Error throws/rejections — do not flag them

            ## Exports map

            - If the diff touches `src/core/index.ts`, `src/aws/index.ts`, or the `exports` field in `package.json`, run `pnpm check:api` to confirm the snapshot is unchanged
            - An unexpected snapshot diff changes the public API and must be reflected in the PR title (`feat!:` or `BREAKING CHANGE:` footer)

            ## Security

            - No hardcoded secrets, tokens, or credentials in source or tests
            - Validate all external input at the public API boundary

            ## Commit hygiene

            - PR title must follow Conventional Commits: `feat:`, `fix:`, `feat!:` or `BREAKING CHANGE:` footer for breaking changes, `docs:`/`refactor:`/`test:`/`chore:` for the rest

            ## Exhaustive-sweep rule (reduces round count)

            When a finding is an instance of a class (e.g. real-fs in a test, an untested
            documented branch, a regex blind spot, a doc-sync drift), **grep/enumerate every
            instance in the diff and list them ALL in one comment** — never one per round.
            A single comment with N findings is far better than N comments each with 1 finding.
            Resolve the entire class in this one round; do not defer instances to a later review.

            ## Re-review behaviour

            On a re-review (when prior review comments already exist on the PR):
            - Re-check all Must-fix items from prior rounds and newly changed lines.
            - Do **NOT** re-raise a non-blocking nit that was already reported in a prior
              PASS comment — only resurface it if the relevant code changed in this push.
            - If all prior Must-fix items are resolved and no new Must-fix items exist,
              the verdict is PASS even if some prior nits remain unaddressed.

            ## Output format

            Post a single PR comment in exactly this structure (blank line before and after
            every heading and every list; no trailing whitespace; no hard tabs; `-` bullets;
            cite locations as `path/to/file.ts:line`; be concise — do not restate unchanged
            conventions):

            Cap each section at its 10 most severe findings, most-severe first. If a
            class of issue recurs, collapse it into ONE bullet listing every instance
            (per the exhaustive-sweep rule) rather than spilling past the cap. A small
            comment also keeps later re-reviews cheap.

            ```
            ## Claude PR Review — `<pr title>`

            <1–2 sentence summary of the change and overall assessment.>

            ### Must-fix

            - **`path/to/file.ts:line`** — <violation> (<which rule>).

            _None._ (if no must-fix findings)

            ### Should-fix

            - …

            _None._ (if no should-fix findings)

            ### Nits

            - …

            _None._ (if no nit findings)

            ### Verdict

            - PASS|FAIL — <one-line reason>

            <!-- claude-review-sha: ${{ github.event.pull_request.head.sha }} -->
            ```

            The trailing `claude-review-sha` HTML comment is REQUIRED and must be
            the last line of the comment, copied verbatim (the SHA is already
            substituted). It lets a later run detect what commit this verdict
            reviewed and skip a redundant re-review.

            ## Turn budget (bounded review)

            You have a hard turn limit. Work efficiently — the diff is already
            provided, so a typical review needs only a few reads. If you approach
            the limit, STOP exploring and immediately (a) post the review comment
            with the findings you have and (b) write the verdict file. NEVER consume
            the whole budget without posting a comment and writing
            `.claude-review-verdict`: a bounded, slightly-incomplete review that
            posts a verdict is far better than an exhausted run that posts nothing.

            ## Verdict (REQUIRED — this gate is blocking)

            After posting the comment, your FINAL action MUST be to run exactly
            one of these two Bash commands (choose based on your verdict):

              echo -n 'PASS' > "$GITHUB_WORKSPACE/.claude-review-verdict"
              echo -n 'FAIL' > "$GITHUB_WORKSPACE/.claude-review-verdict"

            Use the Bash tool — do NOT use the Write tool for this step.
            $GITHUB_WORKSPACE is the absolute path to the checked-out repo.
            The job fails the merge gate unless the file contains exactly `PASS`.

            ## What to review

            The full unified diff for this PR is at
            `$GITHUB_WORKSPACE/.claude-pr-diff.patch` and the changed-file list at
            `$GITHUB_WORKSPACE/.claude-pr-changed-files.txt`. **Read the patch file
            first** and review only those hunks. Open a full source file with `Read`
            ONLY when a hunk lacks the surrounding context you need — do NOT run
            `gh pr diff` or `git diff` to rediscover the diff; it is already provided.
            If the patch is very large, read it in chunks with `Read` offset/limit.
            Fallback: only if the patch file is missing (the pre-compute step failed),
            fetch it yourself with
            `gh pr diff ${{ github.event.pull_request.number }} -R ${{ github.repository }}`.

            Now review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}. Post a single PR comment in the Output format above, then write the verdict file as instructed.

      # Observability only: never affects the PASS/FAIL verdict or the
      # blocking gate below. Reads the execution log the action already
      # produces (steps.claude-review.outputs.execution_file) and pulls
      # metrics from its final `result` entry. Defensive throughout — a
      # missing/malformed file must never fail this job.
      - name: Log Claude review metrics
        if: always() && steps.guard.outputs.should_review == 'true'
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          set +e

          changed_files="n/a"
          patch_lines="n/a"
          patch_chars="0"
          if [ -f "$GITHUB_WORKSPACE/.claude-pr-changed-files.txt" ]; then
            changed_files="$(wc -l < "$GITHUB_WORKSPACE/.claude-pr-changed-files.txt" | tr -d ' ')"
          fi
          if [ -f "$GITHUB_WORKSPACE/.claude-pr-diff.patch" ]; then
            patch_lines="$(wc -l < "$GITHUB_WORKSPACE/.claude-pr-diff.patch" | tr -d ' ')"
            patch_chars="$(wc -c < "$GITHUB_WORKSPACE/.claude-pr-diff.patch" | tr -d ' ')"
          fi

          # claude-code-action truncates diffs at 150k characters (no official
          # numeric guard is published beyond that figure — see
          # docs/research/pr-review-action-tuning.md). Warn loudly rather than
          # let a silent truncation pass as a clean review.
          if echo "$patch_chars" | grep -qE '^[0-9]+$' && [ "$patch_chars" -ge 120000 ]; then
            echo "::warning title=Claude PR Review::Patch is ${patch_chars} characters — near/over the action's ~150k truncation limit; the review may have seen a truncated diff"
            echo "**⚠️ Diff may have been truncated** — patch is ${patch_chars} characters, near/over the action's ~150k truncation limit." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -z "$EXECUTION_FILE" ] || [ ! -s "$EXECUTION_FILE" ]; then
            echo "Claude PR review: no execution file available — skipping metrics." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          result="$(jq -c '[.[] | select(.type == "result")] | last // empty' "$EXECUTION_FILE" 2>/dev/null)"
          if [ -z "$result" ]; then
            echo "Claude PR review: execution file had no result entry — skipping metrics." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          num_turns="$(echo "$result" | jq -r '.num_turns // "n/a"')"
          duration_ms="$(echo "$result" | jq -r '.duration_ms // "n/a"')"
          duration_api_ms="$(echo "$result" | jq -r '.duration_api_ms // "n/a"')"
          cost_usd="$(echo "$result" | jq -r '.total_cost_usd // "n/a"')"
          is_error="$(echo "$result" | jq -r '.is_error // "n/a"')"
          subtype="$(echo "$result" | jq -r '.subtype // "n/a"')"
          input_tokens="$(echo "$result" | jq -r '.usage.input_tokens // "n/a"')"
          output_tokens="$(echo "$result" | jq -r '.usage.output_tokens // "n/a"')"
          cache_read="$(echo "$result" | jq -r '.usage.cache_read_input_tokens // "n/a"')"
          cache_write="$(echo "$result" | jq -r '.usage.cache_creation_input_tokens // "n/a"')"

          {
            echo "### Claude PR Review metrics"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Turns | ${num_turns} / 100 |"
            echo "| Duration (wall / API) | ${duration_ms}ms / ${duration_api_ms}ms |"
            echo "| Cost | \$${cost_usd} |"
            echo "| Tokens (in / out) | ${input_tokens} / ${output_tokens} |"
            echo "| Cache (read / write) | ${cache_read} / ${cache_write} |"
            echo "| Result | subtype=${subtype}, is_error=${is_error} |"
            echo "| Diff size | ${changed_files} files, ${patch_lines} patch lines |"
          } >> "$GITHUB_STEP_SUMMARY"

          if echo "$num_turns" | grep -qE '^[0-9]+$' && [ "$num_turns" -ge 98 ]; then
            echo "::warning title=Claude PR Review::Used ${num_turns}/100 turns — at/near the cap, review may have been cut short"
          else
            echo "::notice title=Claude PR Review::Used ${num_turns}/100 turns (\$${cost_usd}, ${duration_ms}ms)"
          fi

      # Fallback for the one case Claude structurally cannot review: a PR
      # that edits claude-pr-review.yml itself. GitHub's workflow-validation
      # guard refuses to mint the OIDC token claude-code-action needs
      # whenever the running workflow file differs from main's copy, so the
      # action always self-skips (exits success, writes no verdict) on such
      # a PR. Only auto-passes when the workflow file is this PR's SOLE
      # non-ignored change (Gate 0 above) AND the action's own execution_file
      # is empty, proving it never actually attempted a review — a
      # non-empty execution_file means Claude ran but broke its contract by
      # not writing a verdict, which must keep failing loudly rather than
      # being silently waved through. The `steps.claude-review.outcome ==
      # 'success'` check is implied by the default step condition (no
      # always()): if the action itself errored, this step is skipped and
      # Enforce review verdict fails as normal.
      - name: Auto-pass isolated review-gate self-change
        if: steps.guard.outputs.should_review == 'true' && steps.guard.outputs.only_workflow_gate_change == 'true' && steps.claude-review.outcome == 'success'
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          set -euo pipefail
          if [ -f "$GITHUB_WORKSPACE/.claude-review-verdict" ]; then
            echo "Verdict already written — nothing to do."
            exit 0
          fi
          if [ -n "$EXECUTION_FILE" ] && [ -s "$EXECUTION_FILE" ]; then
            echo "Execution file is non-empty — a real review attempt happened without writing a verdict; not auto-passing."
            exit 0
          fi
          echo "claude-pr-review.yml is this PR's only reviewable change and the action's execution_file is empty — GitHub's OIDC workflow-validation guard made a live review structurally impossible. Auto-passing."
          printf 'PASS' > "$GITHUB_WORKSPACE/.claude-review-verdict"

      # When the review was skipped (prior PASS still valid), carry that PASS
      # forward so the enforce step below keeps the required check green.
      - name: Carry prior PASS verdict (review skipped)
        if: steps.guard.outputs.should_review != 'true'
        run: printf 'PASS' > "$GITHUB_WORKSPACE/.claude-review-verdict"

      # Blocking gate (rules 01/04: writer ≠ reviewer). The job fails unless the
      # reviewer explicitly wrote PASS — fail-closed if the review did not run.
      # Requires a branch-protection rule on `main` marking this check required;
      # see docs/contributing/branch-protection.md.
      - name: Enforce review verdict
        run: |
          verdict="$(tr -d '[:space:]' < .claude-review-verdict 2>/dev/null || true)"
          echo "Claude review verdict: ${verdict:-<missing>}"
          if [ "$verdict" != "PASS" ]; then
            echo "::error::Claude PR review did not pass (verdict: ${verdict:-missing}). See the review comment on the PR."
            exit 1
          fi
