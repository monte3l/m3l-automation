packages:
  - "packages/*"
overrides:
  "@typescript-eslint/utils": "^8.62.0"
  "@typescript-eslint/typescript-estree": "^8.62.0"
  "@typescript-eslint/project-service": "^8.62.0"
  "@typescript-eslint/tsconfig-utils": "^8.62.0"
allowBuilds:
  unrs-resolver: false
  lefthook: true
  better-sqlite3: true
# Supply-chain cooldown: hold back package versions younger than this many
# minutes (pnpm's minimumReleaseAge feature). Pinned explicitly rather than
# relying on pnpm v11's default so a future default change cannot silently
# weaken the gate. minimumReleaseAgeExclude is intentionally omitted — it is a
# temporary per-version exemption re-added only when a fresh, must-have bump
# falls inside the window, not a standing list.
minimumReleaseAge: 1440
