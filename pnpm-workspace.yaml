packages:
  - "packages/*"
  - "scripts/*"
overrides:
  "@typescript-eslint/utils": "^8.62.0"
  "@typescript-eslint/typescript-estree": "^8.62.0"
  "@typescript-eslint/project-service": "^8.62.0"
  "@typescript-eslint/tsconfig-utils": "^8.62.0"
allowBuilds:
  unrs-resolver: false
  lefthook: true
minimumReleaseAgeExclude:
  - eslint@10.6.0
  - prettier@3.9.0
  - "@rumdl/cli-darwin-arm64@0.2.26"
  - "@rumdl/cli-darwin-x64@0.2.26"
  - "@rumdl/cli-linux-arm64-musl@0.2.26"
  - "@rumdl/cli-linux-arm64@0.2.26"
  - "@rumdl/cli-linux-x64-musl@0.2.26"
  - "@rumdl/cli-linux-x64@0.2.26"
  - "@rumdl/cli-win32-x64@0.2.26"
  - rumdl@0.2.26
